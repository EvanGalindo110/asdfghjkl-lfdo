<!DOCTYPE html>
<html lang="es-mx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block titulo %}Formulario de Registro{% endblock %} </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 400px;">
            <div class="card-body">
                {% block contenido %}
                <h3 class="text-center">Crea una cuenta</h3>
                <p class="text-center">Es rápido y fácil.</p>

                <form>
                    <div class="row">
                        <div class="col mb-2">
                            <input type="text" class="form-control" placeholder="Nombre">
                        </div>
                        <div class="col mb-2">
                            <input type="text" class="form-control" placeholder="Apellidos">
                        </div>
                    </div>

                    <label class="form-label">Fecha de nacimiento</label>
                    <div class="row">
                        <div class="col">
                            <select class="form-select">
                                <option>1</option>
                            </select>
                        </div>
                        <div class="col">
                            <select class="form-select">
                                <option>oct.</option>
                            </select>
                        </div>
                        <div class="col">
                            <select class="form-select">
                                <option>2025</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <input type="email" class="form-control mb-2" placeholder="Número de móvil o correo electrónico">
                        <input type="password" class="form-control" placeholder="Contraseña nueva">
                    </div>

                    <div class="d-grid mt-3">
                        <button type="button" class="btn btn-success">Registrarte</button>
                    </div>
                    <p class="text-center mt-3">
                        <li class="nav-item"><a class="nav-link" href="/iniciarcesion">Iniciar secion</a></li>
                </form>
            </div>
        </div>
    </div>
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
